<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Giardino Virtuale</title>
  <style>
    body {
      margin: 0;
      background-color: rgb(245,245,220);
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<!-- 👇 AGGIUNTO: bottoni navigazione -->
<div style="position: fixed; right: 30px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 10;">
  <button onclick="scrollUp()" style="width: 50px; height: 50px; font-size: 22px; border-radius: 50%; border: 2px solid black; background: rgb(245,245,220); cursor: pointer;">↑</button>
  <button onclick="scrollDown()" style="width: 50px; height: 50px; font-size: 22px; border-radius: 50%; border: 2px solid black; background: rgb(245,245,220); cursor: pointer;">↓</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const worldHeight = 2300;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let offsetY = 0;

window.addEventListener("wheel", (e) => {
  offsetY += e.deltaY * 0.5;
  offsetY = Math.max(0, Math.min(offsetY, worldHeight - canvas.height));
});

// 👇 AGGIUNTO: funzioni bottoni
function scrollUp() {
  offsetY = Math.min(worldHeight - canvas.height, offsetY + 300);
}

function scrollDown() {
  offsetY = Math.max(0, offsetY - 300);
}

function drawRoad() {
  const lineOffset = 80;
  ctx.strokeStyle = "black";
  ctx.lineWidth = 5;

  ctx.beginPath();
  ctx.moveTo(canvas.width/2 - lineOffset, -offsetY);
  ctx.lineTo(canvas.width/2 - lineOffset, worldHeight - offsetY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(canvas.width/2 + lineOffset, -offsetY);
  ctx.lineTo(canvas.width/2 + lineOffset, worldHeight - offsetY);
  ctx.stroke();
}

function drawRectangles() {
  const rectWidth = 200;
  const rectHeight = 280;
  const distanceFromRoad = 150;
  const startY = canvas.height - rectHeight - 250;

  const rect1X = canvas.width/2 - distanceFromRoad - rectWidth;
  const rect2X = canvas.width/2 + distanceFromRoad;

  // Sinistra
  ctx.strokeRect(rect1X, startY + offsetY, rectWidth, rectHeight);
  ctx.strokeRect(rect1X, startY - rectHeight - 120 + offsetY, rectWidth, rectHeight);
  ctx.strokeRect(rect1X, startY - (rectHeight + 120) * 2 + offsetY, rectWidth, rectHeight);
  ctx.strokeRect(rect1X, startY - (rectHeight + 120) * 3 + offsetY, rectWidth, rectHeight);
  ctx.strokeRect(rect1X, startY - (rectHeight + 120) * 4 + offsetY, rectWidth, rectHeight);

  // Destra
  ctx.strokeRect(rect2X, startY + offsetY, rectWidth, rectHeight);
  ctx.strokeRect(rect2X, startY - rectHeight - 120 + offsetY, rectWidth, rectHeight);
  ctx.strokeRect(rect2X, startY - (rectHeight + 120) * 2 + offsetY, rectWidth, rectHeight);
  ctx.strokeRect(rect2X, startY - (rectHeight + 120) * 3 + offsetY, rectWidth, rectHeight);
  ctx.strokeRect(rect2X, startY - (rectHeight + 120) * 4 + offsetY, rectWidth, rectHeight);
}

function drawStickman(x, y, isFemale = false) {
  ctx.strokeStyle = "black";
  ctx.fillStyle = "black";
  ctx.lineWidth = 2.5;

  // Testa
  ctx.beginPath();
  ctx.arc(x, y - 45, 14, 0, Math.PI * 2);
  ctx.stroke();

  if (isFemale) {
    // Capelli lunghi
    ctx.beginPath();
    ctx.moveTo(x - 14, y - 45);
    ctx.quadraticCurveTo(x - 22, y - 20, x - 18, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 14, y - 45);
    ctx.quadraticCurveTo(x + 22, y - 20, x + 18, y);
    ctx.stroke();
    // Capelli sopra
    ctx.beginPath();
    ctx.arc(x, y - 59, 14, Math.PI, 0);
    ctx.stroke();
  } else {
    // Capelli corti maschio
    ctx.beginPath();
    ctx.arc(x, y - 59, 14, Math.PI, 0);
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.lineWidth = 2.5;
  }

  // Collo
  ctx.beginPath();
  ctx.moveTo(x, y - 31);
  ctx.lineTo(x, y - 22);
  ctx.stroke();

  if (isFemale) {
    // Vestito (corpo a triangolo)
    ctx.beginPath();
    ctx.moveTo(x - 10, y - 22);
    ctx.lineTo(x + 10, y - 22);
    ctx.lineTo(x + 18, y + 20);
    ctx.lineTo(x - 18, y + 20);
    ctx.closePath();
    ctx.stroke();

    // Braccia
    ctx.beginPath();
    ctx.moveTo(x - 10, y - 18);
    ctx.quadraticCurveTo(x - 28, y - 5, x - 22, y + 10);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 10, y - 18);
    ctx.quadraticCurveTo(x + 28, y - 5, x + 22, y + 10);
    ctx.stroke();

    // Gambe
    ctx.beginPath();
    ctx.moveTo(x - 8, y + 20);
    ctx.lineTo(x - 10, y + 50);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 8, y + 20);
    ctx.lineTo(x + 10, y + 50);
    ctx.stroke();

  } else {
    // Corpo maschio (rettangolo)
    ctx.beginPath();
    ctx.moveTo(x - 10, y - 22);
    ctx.lineTo(x + 10, y - 22);
    ctx.lineTo(x + 10, y + 10);
    ctx.lineTo(x - 10, y + 10);
    ctx.closePath();
    ctx.stroke();

    // Braccia
    ctx.beginPath();
    ctx.moveTo(x - 10, y - 18);
    ctx.quadraticCurveTo(x - 28, y - 5, x - 20, y + 12);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 10, y - 18);
    ctx.quadraticCurveTo(x + 28, y - 5, x + 20, y + 12);
    ctx.stroke();

    // Gambe
    ctx.beginPath();
    ctx.moveTo(x - 5, y + 10);
    ctx.lineTo(x - 8, y + 50);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 5, y + 10);
    ctx.lineTo(x + 8, y + 50);
    ctx.stroke();
  }
}

function drawNames(x, y, name) {
  ctx.fillStyle = "black";
  ctx.font = "bold 15px Arial";
  ctx.textAlign = "center";
  ctx.fillText(name, x, y + 68);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRoad();
  drawRectangles();

  const centerX = canvas.width / 2;
  const bottomY = canvas.height - 80;

  drawStickman(centerX - 40, bottomY, false);
  drawNames(centerX - 40, bottomY, "Talha");

  drawStickman(centerX + 40, bottomY, true);
  drawNames(centerX + 40, bottomY, "Aysha");

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
