<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Garden 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── GLOBAL ── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: rgb(245,245,220); min-height: 100vh; overflow: hidden; }

/* ── SCREENS ── */
.screen { display: none; width: 100%; min-height: 100vh; }
.screen.active { display: block; }

/* ══════════════════════════════
   WELCOME SCREEN
══════════════════════════════ */
#welcome-screen {
  background: rgb(245,245,220);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px 24px;
  gap: 0;
}

.welcome-title {
  font-family: 'Caveat', cursive;
  font-size: 38px; font-weight: 600;
  color: #333; text-align: center;
  margin-bottom: 6px;
}
.welcome-sub {
  font-family: 'Caveat', cursive;
  font-size: 18px; color: #777;
  text-align: center; margin-bottom: 40px;
  font-style: italic;
}

/* SVG welcome illustration */
.welcome-art { margin-bottom: 40px; }

.welcome-btns {
  display: flex; flex-direction: column;
  gap: 14px; width: 100%; max-width: 280px;
}

.welcome-btn {
  padding: 16px 28px;
  border: 2.5px solid #333; border-radius: 14px;
  background: rgb(245,245,220);
  font-family: 'Caveat', cursive; font-size: 22px;
  color: #333; cursor: pointer; text-align: center;
  box-shadow: 4px 4px 0 #333;
  transition: transform 0.12s, box-shadow 0.12s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.welcome-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #333; }
.welcome-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #333; }

.welcome-btn.story { background: #333; color: rgb(245,245,220); }
.welcome-btn.garden { background: rgb(245,245,220); color: #333; }

/* ══════════════════════════════
   INTRO SCREEN
══════════════════════════════ */
#intro-screen {
  background: #e8e8d0;
  display: flex; justify-content: center;
  padding: 24px; min-height: 100vh;
}


* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #e8e8d0; display: flex; justify-content: center; padding: 24px; min-height: 100vh; }

#intro-scene {
  width: 100%;
  max-width: 600px;
  background: rgb(245,245,220);
  border-radius: 14px;
  border: 1px solid #ccc8a0;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  user-select: none;
}

.bubble-group { transition: opacity 0.2s; }
.bubble-group.hidden { opacity: 0; pointer-events: none; }

.click-hint {
  position: absolute;
  bottom: 10px; right: 14px;
  font-size: 11px;
  color: rgba(80,70,30,0.5);
  animation: hintBlink 1.1s infinite alternate;
  pointer-events: none;
}

@keyframes hintBlink { from { opacity:0.3; } to { opacity:0.9; } }

@keyframes floatHeart {
  0%   { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-65px) scale(0.3); }
}


.skip-btn {
  position: absolute;
  top: 12px; right: 14px;
  padding: 5px 14px;
  border-radius: 999px;
  border: 1px solid #c0b070;
  background: rgba(180,160,60,0.12);
  color: #7a6a30;
  font-size: 12px;
  cursor: pointer;
  z-index: 50;
  transition: background 0.2s;
  font-family: sans-serif;
}
.skip-btn:hover { background: rgba(180,160,60,0.28); }
.end-overlay {
  position: absolute; inset: 0;
  background: rgba(245,245,220,0.94);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; opacity: 0; pointer-events: none;
  transition: opacity 0.7s; border-radius: 14px;
}
.end-overlay.visible { opacity:1; pointer-events:all; }
.end-title { font-size: 24px; font-weight: 700; color: #3a3a1a; }
.end-sub { font-size: 13px; color: #6a6a4a; }
.enter-btn {
  padding: 10px 30px; border-radius: 999px;
  border: 1.5px solid #b0a060;
  background: rgba(180,160,60,0.1);
  color: #3a3a1a; font-size: 14px; cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.enter-btn:hover { background: rgba(180,160,60,0.25); transform: scale(1.04); }




/* ══════════════════════════════
   GARDEN SCREEN
══════════════════════════════ */
#garden-screen {
  background: #1a1005;
  display: flex; justify-content: center;
  align-items: center; min-height: 100vh;
}


* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1005; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

#game-wrap {
  width: 100%; max-width: 480px;
  height: 100vh; max-height: 820px;
  position: relative; overflow: hidden;
  background: rgb(245,245,220);
  font-family: 'Caveat', cursive;
}

#world {
  position: absolute; top: 0; left: 0; right: 0;
  transition: transform 0.75s cubic-bezier(0.4,0,0.2,1);
}

/* grass strip top */
.grass-strip {
  position: absolute; left: 0; right: 0;
  height: 32px;
  background: #7ab648;
  border-bottom: 3px solid #4a8a2a;
}

/* road */
.road {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 60px; top: 0; bottom: 0;
  background: #d4c9a8;
  border-left: 2.5px solid #b8a880;
  border-right: 2.5px solid #b8a880;
}
.road-dash {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 4px; height: 22px; background: #e8ddb0; border-radius: 2px;
}

/* garden bed */
.garden-bed {
  position: absolute;
  width: 148px;
  cursor: pointer;
  transition: transform 0.15s;
}
.garden-bed:hover { transform: scale(1.02); }

/* characters fixed */
#characters {
  position: absolute; bottom: 55px;
  left: 50%; transform: translateX(-50%);
  display: flex; gap: 2px;
  pointer-events: none; z-index: 30;
}
@keyframes walkBob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
@keyframes legL { 0%,100%{transform:rotate(-20deg);} 50%{transform:rotate(20deg);} }
@keyframes legR { 0%,100%{transform:rotate(20deg);} 50%{transform:rotate(-20deg);} }
@keyframes armL { 0%,100%{transform:rotate(16deg);} 50%{transform:rotate(-16deg);} }
@keyframes armR { 0%,100%{transform:rotate(-16deg);} 50%{transform:rotate(16deg);} }
.char-svg { animation: walkBob 0.6s ease-in-out infinite; }

/* nav */
#nav-up, #nav-down {
  position: absolute; right: 12px;
  width: 42px; height: 42px; border-radius: 50%;
  background: rgb(245,245,220); border: 2.5px solid #333;
  cursor: pointer; font-size: 18px; font-family: 'Caveat', cursive;
  display: flex; align-items: center; justify-content: center;
  z-index: 100; box-shadow: 2px 2px 0 #333;
  transition: transform 0.1s; user-select: none;
}
#nav-up  { bottom: calc(50% + 8px); }
#nav-down { top:   calc(50% + 8px); }
#nav-up:active, #nav-down:active { transform: scale(0.9); }

/* HUD */
#hud { position: absolute; top: 10px; left: 12px; z-index: 100; display: flex; gap: 7px; }
.hud-badge { background: rgb(245,245,220); border: 2px solid #333; border-radius: 999px; padding: 3px 12px; font-size: 14px; color: #333; box-shadow: 2px 2px 0 #aaa; }

#section-label {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  background: rgb(245,245,220); border: 2px solid #333; border-radius: 8px;
  padding: 3px 16px; font-size: 15px; color: #333;
  z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.4s;
  box-shadow: 2px 2px 0 #aaa; white-space: nowrap;
}

/* butterfly */
@keyframes bfly { 0%,100%{transform:translate(0,0);} 33%{transform:translate(8px,-10px);} 66%{transform:translate(-5px,-7px);} }

/* modals */
#plant-modal, #info-modal {
  position: absolute; inset: 0; background: rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
#plant-modal.visible, #info-modal.visible { opacity:1; pointer-events:all; }

.modal-card {
  background: rgb(245,245,220); border: 2.5px solid #333;
  border-radius: 14px; padding: 18px; width: 290px;
  box-shadow: 4px 4px 0 #333;
}
.modal-card h3 { font-size: 20px; color: #333; margin-bottom: 12px; text-align: center; }

.flower-picker { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 12px; }
.flower-opt {
  width: 46px; height: 52px; border: 2px solid #bbb; border-radius: 8px;
  cursor: pointer; display: flex; flex-direction: column; align-items: center;
  justify-content: flex-end; padding: 2px; background: rgb(245,245,220);
  transition: transform 0.15s, border-color 0.15s;
}
.flower-opt:hover { transform: scale(1.1); }
.flower-opt.selected { border-color: #333; border-width: 2.5px; background: #ddddb8; }
.flower-opt span { font-size: 9px; color: #555; margin-top: 1px; }

.who-picker { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
.who-btn { padding: 5px 16px; border: 2px solid #bbb; border-radius: 999px; background: rgb(245,245,220); font-family: 'Caveat', cursive; font-size: 14px; cursor: pointer; color: #555; }
.who-btn.active { border-color: #333; color: #333; background: #ddddb8; font-weight: 600; }

.msg-input { width: 100%; padding: 7px 10px; border: 2px solid #bbb; border-radius: 8px; font-family: 'Caveat', cursive; font-size: 13px; margin-bottom: 10px; background: rgb(245,245,220); color: #333; resize: none; }
.modal-btns { display: flex; gap: 8px; }
.btn-plant { flex: 1; padding: 8px; border: 2px solid #333; border-radius: 8px; background: #333; color: rgb(245,245,220); font-family: 'Caveat', cursive; font-size: 15px; cursor: pointer; box-shadow: 2px 2px 0 #000; }
.btn-cancel { padding: 8px 14px; border: 2px solid #bbb; border-radius: 8px; background: transparent; font-family: 'Caveat', cursive; font-size: 14px; cursor: pointer; color: #555; }

.info-card { background: rgb(245,245,220); border: 2.5px solid #333; border-radius: 14px; padding: 20px; width: 250px; text-align: center; box-shadow: 4px 4px 0 #333; }
.info-who { font-size: 16px; color: #333; margin: 8px 0 3px; }
.info-date { font-size: 13px; color: #888; margin-bottom: 10px; }
.info-msg { font-size: 15px; color: #333; font-style: italic; background: #e0e0b0; border-radius: 8px; border: 1.5px solid #bbb; padding: 8px 12px; margin-bottom: 12px; min-height: 36px; }
.close-btn { padding: 7px 22px; border: 2px solid #333; border-radius: 8px; background: transparent; font-family: 'Caveat', cursive; font-size: 14px; cursor: pointer; color: #333; }

#toast { position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%); background: #333; color: rgb(245,245,220); padding: 7px 18px; border-radius: 999px; font-family: 'Caveat', cursive; font-size: 14px; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s; white-space: nowrap; }
#toast.show { opacity: 1; }

@keyframes bloomIn { 0%{transform:scale(0) rotate(-15deg);opacity:0;} 70%{transform:scale(1.2) rotate(4deg);opacity:1;} 100%{transform:scale(1) rotate(0);opacity:1;} }
.bloom { animation: bloomIn 0.5s ease-out forwards; }


</style>
</head>
<body>

<!-- ══ WELCOME SCREEN ══ -->
<div id="welcome-screen" class="screen active">
  <div class="welcome-title">Our Virtual Garden</div>
  <div class="welcome-sub">a garden that grows with love 🌸</div>

<!-- ══ INTRO SCREEN ══ -->
<div id="intro-screen" class="screen">
  
<div id="intro-scene" onclick="advance()">

  <button class="skip-btn" onclick="skipToGarden(event)">Skip ›</button>

  <svg width="100%" viewBox="0 0 520 370" style="display:block;">
    <defs>
      <filter id="rough">
        <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" seed="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8" xChannelSelector="R" yChannelSelector="G"/>
      </filter>

    <!-- ground -->

    <!-- TALHA stickman -->

    <!-- AYSHA stickman -->
    <g id="her-char" style="transition:opacity 0.4s;" filter="url(#rough)">

      <line x1="392" y1="246" x2="392" y2="276" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>

      <circle cx="180" cy="177" r="6" fill="none" stroke="#444" stroke-width="2"/>
      <path d="M193 163 Q193 123 233 121 Q243 97 273 100 Q303 91 319 113 Q345 109 347 133 Q367 135 365 157 Q367 177 345 179 Q331 191 311 187 Q295 199 270 194 Q249 205 225 197 Q201 203 191 183 Q177 179 193 163 Z"

<script>
const SCRIPT = [
  { speaker: 'him', name: 'Talha', text: "Heello my love!\nI heard you like flowers a lot?" },
  { speaker: 'her', name: 'Aysha', text: "Yes, you heard right babe! 🥰" },
  { speaker: 'him', name: 'Talha', text: "More than me? 🤨" },
  { speaker: 'her', name: 'Aysha', text: "Yap 😶\nWhy is it any problem?" },
  { speaker: 'him', name: 'Talha', text: "Nah never mind..!! 😒" },
  { speaker: 'him', name: 'Talha', text: "But I miss you more than I remember you! 😫" },
  { speaker: 'her', name: 'Aysha', text: "Really 👀\nLike how much?" },
  { speaker: 'him', name: 'Talha', text: "Enough to build you something special. 😚" },
  { speaker: 'her', name: 'Aysha', text: "Hmm! Interesting!" },
  { speaker: 'him', name: 'Talha', text: "I created a virtual garden only for you darling! 😚" },
  { speaker: 'her', name: 'Aysha', text: "Wow! That's... the sweetest thing anyone's ever done to me 🥺" },
  { speaker: 'him', name: 'Talha', text: '', anim: 'hug' },
  { speaker: 'her', name: 'Aysha', text: "Tnx 💕" },
  { speaker: 'him', name: 'Talha', text: "Only tnx!! 😒 Never mind..😖" },
  { speaker: 'him', name: 'Talha', text: "Come on, let's go to visit our virtual garden babe." },
  { speaker: 'her', name: 'Aysha', text: "Yeeeeee!! Let's goooooo 🎉" },
];

let step = 0, typing = false, typeTimer = null, currentFull = '', currentPos = 0;
let hugFrameTimer = null, currentHugFrame = 1;
let heartInterval = null;


function updateUI() {}

function wrapText(text, maxChars) {
  const words = text.split(' ');
  const lines = [], cur = [''];
  let c = '';
  for (const w of words) {
    const cand = c ? c + ' ' + w : w;
    if (cand.length > maxChars) { lines.push(c); c = w; }
    else c = cand;
  }
  if (c) lines.push(c);
  return lines;
}

function renderBubbleText(elId, text) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = '';
  // Split on explicit \n first, then wrap each segment
  const segments = text.split('\n');
  const lines = [];
  segments.forEach(seg => wrapText(seg, 20).forEach(l => lines.push(l)));
  const cx = elId === 'him-text' ? '278' : '242';
  const totalH = (lines.length - 1) * 15;
  const baseY = 150 - totalH / 2;
  lines.forEach((line, i) => {
    const ts = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
    ts.setAttribute('x', cx);
    if (i === 0) ts.setAttribute('y', String(baseY));
    else ts.setAttribute('dy', '15');
    ts.textContent = line;
    el.appendChild(ts);
  });
}

function typeInBubble(textId, text) {
  typing = true; currentFull = text; currentPos = 0;
  document.getElementById('click-hint').style.opacity = '0';
  const el = document.getElementById(textId);
  if (el) el.innerHTML = '';
  function tick() {
    currentPos++;
    renderBubbleText(textId, currentFull.slice(0, currentPos));
    if (currentPos < currentFull.length) typeTimer = setTimeout(tick, 34);
    else { typing = false; document.getElementById('click-hint').style.opacity = '1'; }
  }
  tick();
}

function showHugFrame(n) {
  for (let i = 1; i <= 4; i++) {
    const f = document.getElementById('bf' + i);
    if (f) f.style.display = i === n ? 'block' : 'none';
  }
}

function startHugAnimation() {
  currentHugFrame = 1;
  showHugFrame(1);
  hugFrameTimer = setInterval(() => {
    currentHugFrame = currentHugFrame >= 4 ? 1 : currentHugFrame + 1;
    showHugFrame(currentHugFrame);
  }, 700);
}

function stopHugAnimation() {
  clearInterval(hugFrameTimer);
  for (let i = 1; i <= 4; i++) {
    const f = document.getElementById('bf' + i);
    if (f) f.style.display = 'none';
  }
  
}

function spawnHearts() {
  clearInterval(heartInterval);
  heartInterval = setInterval(() => {
    const scene = document.getElementById('intro-scene');
    const h = document.createElement('div');
    const emojis = ['💕','💗','💖','😘','🌸','💝'];
    h.style.cssText = 'position:absolute;font-size:'+(14+Math.random()*10)+'px;'
      +'left:'+(20+Math.random()*60)+'%;bottom:'+(30+Math.random()*40)+'%;'
      +'animation:floatHeart 1.2s ease-out forwards;pointer-events:none;z-index:20;';
    h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    scene.appendChild(h);
    setTimeout(() => h.remove(), 1300);
  }, 240);
}

function stopHearts() { clearInterval(heartInterval); }

function showStep(idx) {
  if (idx >= SCRIPT.length) { showEnd(); return; }
  const line = SCRIPT[idx];

  document.getElementById('him-bubble').classList.add('hidden');
  document.getElementById('her-bubble').classList.add('hidden');
  document.getElementById('hug-bubble').classList.add('hidden');
  stopHearts();
  stopHugAnimation();
  updateUI();

  // Show "Reality" label only on the Tnx step (first after hug)
  const realityLabel = document.getElementById('reality-label');
  if (realityLabel) {
    realityLabel.style.opacity = (line.text === 'Tnx 💕') ? '1' : '0';
  }

  if (line.anim === 'hug') {
    document.getElementById('him-char').style.opacity = '1';
    document.getElementById('her-char').style.opacity = '0.28';
    document.getElementById('hug-bubble').classList.remove('hidden');
    document.getElementById('click-hint').style.opacity = '1';
    typing = false;
    startHugAnimation();
    spawnHearts();
    return;
  }

  document.getElementById('him-char').style.opacity = line.speaker === 'him' ? '1' : '0.28';
  document.getElementById('her-char').style.opacity = line.speaker === 'her' ? '1' : '0.28';
  const bubbleId = line.speaker === 'him' ? 'him-bubble' : 'her-bubble';
  const textId   = line.speaker === 'him' ? 'him-text'   : 'her-text';
  document.getElementById(bubbleId).classList.remove('hidden');
  typeInBubble(textId, line.text);
}

function advance() {
  if (typing) {
    clearTimeout(typeTimer); typing = false;
    const line = SCRIPT[step];
    if (!line.anim) renderBubbleText(line.speaker === 'him' ? 'him-text' : 'her-text', currentFull);
    document.getElementById('click-hint').style.opacity = '1';
    return;
  }
  stopHearts(); stopHugAnimation();
  step++;
  if (step >= SCRIPT.length) showEnd();
  else showStep(step);
}

function showEnd() {
  stopHearts(); stopHugAnimation();
  document.getElementById('end-overlay').classList.add('visible');
  document.getElementById('click-hint').style.display = 'none';
}

function skipToGarden(e) {
  e.stopPropagation();
  stopHearts(); stopHugAnimation();
  showEnd();
}

function enterGarden(e) {
  e.stopPropagation();
  alert('🌸 Benvenuto nel giardino!');
}

showStep(0);
</script>

const FLIST = [
  {id:'rose',name:'Rose'},{id:'tulip',name:'Tulip'},{id:'sunflower',name:'Sunflower'},
  {id:'daisy',name:'Daisy'},{id:'lily',name:'Lily'},{id:'orchid',name:'Orchid'},
  {id:'carnation',name:'Carnation'},{id:'peony',name:'Peony'},{id:'anemone',name:'Anemone'},
  {id:'hibiscus',name:'Hibiscus'},{id:'camellia',name:'Camellia'},{id:'gerbera',name:'Gerbera'},
];

function flowerSVG(id, w, h) {
  return `<svg viewBox="0 0 22 48" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">${F[id]||''}</svg>`;
}

// SECTIONS: 5 sections, each has left+right garden bed
const SECTIONS = [
  { name:'Rose Valley',    lName:'Rose Garden',     rName:'Tulip Field',
    lTheme:['rose','rose','camellia','tulip','rose','rose','camellia','tulip'],
    rTheme:['tulip','tulip','peony','carnation','tulip','peony','tulip','orchid'] },
  { name:'Sunny Meadow',   lName:'Sunflower Patch',  rName:'Daisy Hill',
    lTheme:['sunflower','sunflower','daisy','sunflower','gerbera','sunflower','sunflower','daisy'],
    rTheme:['daisy','daisy','gerbera','daisy','carnation','daisy','sunflower','daisy'] },
  { name:'Lily Garden',    lName:'Lily Grove',       rName:'Orchid Corner',
    lTheme:['lily','lily','anemone','lily','hibiscus','lily','lily','anemone'],
    rTheme:['orchid','orchid','lily','anemone','orchid','orchid','daisy','orchid'] },
  { name:'Blossom Park',   lName:'Peony Paradise',   rName:'Carnation Walk',
    lTheme:['peony','peony','rose','peony','carnation','peony','peony','rose'],
    rTheme:['carnation','carnation','gerbera','carnation','orchid','carnation','tulip','carnation'] },
  { name:'Secret Garden',  lName:'Magic Garden',     rName:'Eternal Bloom',
    lTheme:['hibiscus','rose','lily','orchid','camellia','gerbera','hibiscus','peony'],
    rTheme:['anemone','peony','hibiscus','gerbera','tulip','camellia','rose','anemone'] },
];

const SH = 500; // section height px
let curSec = 0;
let plantTarget = null;
let selF = 'rose';
let selWho = 'him';
let myF = [];
try { myF = JSON.parse(localStorage.getItem('vg5')||'[]'); } catch(e){}
function save(){ try{localStorage.setItem('vg5',JSON.stringify(myF));}catch(e){} }
function fdef(id){ return FLIST.find(f=>f.id===id); }

// ── BUILD WORLD ──
function buildWorld() {
  const world = document.getElementById('world');
  const totalH = SECTIONS.length * SH + 200;

  // Road SVG background
  const roadSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  roadSvg.setAttribute('width','100%');
  roadSvg.setAttribute('height', totalH);
  roadSvg.style.cssText='position:absolute;top:0;left:0;pointer-events:none;';

  let roadHTML = `
    <rect x="210" y="0" width="60" height="${totalH}" fill="#d4c9a8"/>
    <line x1="210" y1="0" x2="210" y2="${totalH}" stroke="#b8a880" stroke-width="2"/>
    <line x1="270" y1="0" x2="270" y2="${totalH}" stroke="#b8a880" stroke-width="2"/>`;
  for(let y=30; y<totalH; y+=45)
    roadHTML += `<rect x="237" y="${y}" width="6" height="20" rx="2" fill="#e8ddb0"/>`;
  // Grass strips at top of each section
  SECTIONS.forEach((_,si) => {
    const y = si*SH;
    roadHTML += `<rect x="0" y="${y}" width="480" height="28" fill="#7ab648"/>
      <path d="M0 28 ${Array.from({length:48},(_,i)=>`Q${i*10+5} 18 ${(i+1)*10} 28`).join(' ')}" fill="#7ab648" stroke="#4a8a2a" stroke-width="1.5"/>`;
  });
  roadSvg.innerHTML = roadHTML;
  world.appendChild(roadSvg);

  // Road dashes dividers (already in SVG above)
  // Build garden beds
  SECTIONS.forEach((sec, si) => {
    [['left',sec.lName,sec.lTheme],['right',sec.rName,sec.rTheme]].forEach(([side,label,theme]) => {
      buildBed(world, si, side, label, theme);
    });
  });

  buildPicker();
}

function buildBed(world, si, side, label, theme) {
  const yBase = si * SH;
  const bed = document.createElement('div');
  bed.className = 'garden-bed';
  bed.style.top = (yBase + 36) + 'px';
  bed.style.height = '240px';
  if (side==='left') bed.style.right = 'calc(50% + 8px)';
  else bed.style.left = 'calc(50% + 8px)';
  bed.onclick = () => openPlant(si, side);

  // Bed SVG (hand-drawn rectangle, soil texture)
  const bedW = 148, bedH = 240;
  bed.innerHTML = `
    <svg width="${bedW}" height="${bedH}" viewBox="0 0 ${bedW} ${bedH}" style="position:absolute;top:0;left:0;pointer-events:none;">
      <!-- soil background -->
      <path d="M6 6 Q74 2 142 6 Q146 80 144 234 Q74 238 4 234 Q2 120 6 6Z"
        fill="#a07040" stroke="#222" stroke-width="2.2" stroke-linejoin="round"/>
      <!-- soil texture lines -->
      ${Array.from({length:6},(_,i)=>`<path d="M${10+i*2} ${30+i*35} Q${50+i} ${26+i*35} ${90+i} ${30+i*35} Q${120+i} ${26+i*35} ${138-i} ${30+i*35}" fill="none" stroke="#7a5028" stroke-width="1" opacity="0.5"/>`).join('')}
      <!-- label sign -->
      <rect x="24" y="6" width="100" height="18" rx="4" fill="rgb(245,245,220)" stroke="#222" stroke-width="1.5"/>
      <text x="74" y="19" text-anchor="middle" font-family="Caveat,cursive" font-size="12" fill="#333">${label}</text>
    </svg>`;

  // Flowers container
  const fc = document.createElement('div');
  fc.id = `fc-${si}-${side}`;
  fc.style.cssText='position:absolute;top:28px;left:6px;right:6px;bottom:6px;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;align-items:end;overflow:hidden;';
  bed.appendChild(fc);

  // Butterflies
  for(let b=0;b<2;b++){
    const bf=document.createElement('div');
    bf.style.cssText=`position:absolute;font-size:13px;top:${-20-b*7}px;left:${12+b*58}px;pointer-events:none;animation:bfly ${(2.2+b*1.3).toFixed(1)}s ease-in-out ${(b*0.9).toFixed(1)}s infinite;`;
    bf.textContent='🦋';
    bed.appendChild(bf);
  }

  world.appendChild(bed);
  renderBed(si, side, theme);
}

function renderBed(si, side, theme) {
  const fc = document.getElementById(`fc-${si}-${side}`);
  if (!fc) return;
  fc.innerHTML = '';

  const themeList = theme || (side==='left'? SECTIONS[si].lTheme : SECTIONS[si].rTheme);

  // Theme flowers (decorative, small)
  themeList.forEach(id => {
    const cell = document.createElement('div');
    cell.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:flex-end;pointer-events:none;';
    cell.innerHTML = flowerSVG(id, 26, 52);
    fc.appendChild(cell);
  });

  // User flowers
  myF.filter(f=>f.si===si&&f.side===side).forEach(fl => {
    const cell = document.createElement('div');
    cell.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:flex-end;cursor:pointer;';
    cell.innerHTML = flowerSVG(fl.fid, 28, 56);
    const lbl = document.createElement('div');
    lbl.style.cssText='font-size:7px;color:#f5e8c0;font-family:Caveat,cursive;margin-top:-2px;';
    lbl.textContent = fl.who==='him'?'T':'A';
    cell.appendChild(lbl);
    cell.onclick = (e) => { e.stopPropagation(); openInfo(fl); };
    fc.appendChild(cell);
  });
}

function buildPicker() {
  const p = document.getElementById('flower-picker');
  FLIST.forEach(def => {
    const opt = document.createElement('div');
    opt.className = 'flower-opt' + (def.id===selF?' selected':'');
    opt.dataset.id = def.id;
    opt.innerHTML = flowerSVG(def.id, 32, 42) + `<span>${def.name}</span>`;
    opt.onclick = () => {
      document.querySelectorAll('.flower-opt').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected'); selF = def.id;
    };
    p.appendChild(opt);
  });
}

// ── NAV ──
function moveUp()   { if(curSec<=0){toast('You are at the start! 🌱');return;} curSec--; go(); }
function moveDown() { if(curSec>=SECTIONS.length-1){toast('More gardens soon! 🌟');return;} curSec++; go(); }
function go() {
  document.getElementById('world').style.transform=`translateY(${-curSec*SH}px)`;
  document.getElementById('hud-f').textContent=`🌸 ${myF.length}`;
  document.getElementById('hud-s').textContent=`${curSec+1}/5`;
  const el=document.getElementById('section-label');
  el.textContent=SECTIONS[curSec].name; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.opacity='0',2200);

  const words = text.split(' ');

  roadSvg.style.cssText='position:absolute;top:0;left:0;pointer-events:none;';

  let roadHTML = `
    <rect x="210" y="0" width="60" height="${totalH}" fill="#d4c9a8"/>
    <line x1="210" y1="0" x2="210" y2="${totalH}" stroke="#b8a880" stroke-width="2"/>
    <line x1="270" y1="0" x2="270" y2="${totalH}" stroke="#b8a880" stroke-width="2"/>`;
  for(let y=30; y<totalH; y+=45)
    roadHTML += `<rect x="237" y="${y}" width="6" height="20" rx="2" fill="#e8ddb0"/>`;
  // Grass strips at top of each section
  SECTIONS.forEach((_,si) => {
    const y = si*SH;
    roadHTML += `<rect x="0" y="${y}" width="480" height="28" fill="#7ab648"/>
      <path d="M0 28 ${Array.from({length:48},(_,i)=>`Q${i*10+5} 18 ${(i+1)*10} 28`).join(' ')}" fill="#7ab648" stroke="#4a8a2a" stroke-width="1.5"/>`;
  });
  roadSvg.innerHTML = roadHTML;
  world.appendChild(roadSvg);

  // Road dashes dividers (already in SVG above)
  // Build garden beds
  SECTIONS.forEach((sec, si) => {
    [['left',sec.lName,sec.lTheme],['right',sec.rName,sec.rTheme]].forEach(([side,label,theme]) => {
      buildBed(world, si, side, label, theme);
    });
  });

  buildPicker();
}

function buildBed(world, si, side, label, theme) {
  const yBase = si * SH;
  const bed = document.createElement('div');
  bed.className = 'garden-bed';
  bed.style.top = (yBase + 36) + 'px';
  bed.style.height = '240px';
  if (side==='left') bed.style.right = 'calc(50% + 8px)';
  else bed.style.left = 'calc(50% + 8px)';
  bed.onclick = () => openPlant(si, side);

  // Bed SVG (hand-drawn rectangle, soil texture)
  const bedW = 148, bedH = 240;
  bed.innerHTML = `
    <svg width="${bedW}" height="${bedH}" viewBox="0 0 ${bedW} ${bedH}" style="position:absolute;top:0;left:0;pointer-events:none;">
      <!-- soil background -->
      <path d="M6 6 Q74 2 142 6 Q146 80 144 234 Q74 238 4 234 Q2 120 6 6Z"
        fill="#a07040" stroke="#222" stroke-width="2.2" stroke-linejoin="round"/>
      <!-- soil texture lines -->
      ${Array.from({length:6},(_,i)=>`<path d="M${10+i*2} ${30+i*35} Q${50+i} ${26+i*35} ${90+i} ${30+i*35} Q${120+i} ${26+i*35} ${138-i} ${30+i*35}" fill="none" stroke="#7a5028" stroke-width="1" opacity="0.5"/>`).join('')}
      <!-- label sign -->
      <rect x="24" y="6" width="100" height="18" rx="4" fill="rgb(245,245,220)" stroke="#222" stroke-width="1.5"/>
      <text x="74" y="19" text-anchor="middle" font-family="Caveat,cursive" font-size="12" fill="#333">${label}</text>
    </svg>`;

  // Flowers container
  const fc = document.createElement('div');
  fc.id = `fc-${si}-${side}`;
  fc.style.cssText='position:absolute;top:28px;left:6px;right:6px;bottom:6px;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;align-items:end;overflow:hidden;';
  bed.appendChild(fc);

  // Butterflies
  for(let b=0;b<2;b++){
    const bf=document.createElement('div');
    bf.style.cssText=`position:absolute;font-size:13px;top:${-20-b*7}px;left:${12+b*58}px;pointer-events:none;animation:bfly ${(2.2+b*1.3).toFixed(1)}s ease-in-out ${(b*0.9).toFixed(1)}s infinite;`;
    bf.textContent='🦋';
    bed.appendChild(bf);
  }

  world.appendChild(bed);
  renderBed(si, side, theme);
}

function renderBed(si, side, theme) {
  const fc = document.getElementById(`fc-${si}-${side}`);
  if (!fc) return;
  fc.innerHTML = '';

  const themeList = theme || (side==='left'? SECTIONS[si].lTheme : SECTIONS[si].rTheme);

  // Theme flowers (decorative, small)
  themeList.forEach(id => {
    const cell = document.createElement('div');
    cell.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:flex-end;pointer-events:none;';
    cell.innerHTML = flowerSVG(id, 26, 52);
    fc.appendChild(cell);
  });

  // User flowers
  myF.filter(f=>f.si===si&&f.side===side).forEach(fl => {
    const cell = document.createElement('div');
    cell.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:flex-end;cursor:pointer;';
    cell.innerHTML = flowerSVG(fl.fid, 28, 56);
    const lbl = document.createElement('div');
    lbl.style.cssText='font-size:7px;color:#f5e8c0;font-family:Caveat,cursive;margin-top:-2px;';
    lbl.textContent = fl.who==='him'?'T':'A';
    cell.appendChild(lbl);
    cell.onclick = (e) => { e.stopPropagation(); openInfo(fl); };
    fc.appendChild(cell);
  });
}

function buildPicker() {
  const p = document.getElementById('flower-picker');
  FLIST.forEach(def => {
    const opt = document.createElement('div');
    opt.className = 'flower-opt' + (def.id===selF?' selected':'');
    opt.dataset.id = def.id;
    opt.innerHTML = flowerSVG(def.id, 32, 42) + `<span>${def.name}</span>`;
    opt.onclick = () => {
      document.querySelectorAll('.flower-opt').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected'); selF = def.id;
    };
    p.appendChild(opt);
  });
}

// ── NAV ──
function moveUp()   { if(curSec<=0){toast('You are at the start! 🌱');return;} curSec--; go(); }
function moveDown() { if(curSec>=SECTIONS.length-1){toast('More gardens soon! 🌟');return;} curSec++; go(); }
function go() {
  document.getElementById('world').style.transform=`translateY(${-curSec*SH}px)`;
  document.getElementById('hud-f').textContent=`🌸 ${myF.length}`;
  document.getElementById('hud-s').textContent=`${curSec+1}/5`;
  const el=document.getElementById('section-label');
  el.textContent=SECTIONS[curSec].name; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.opacity='0',2200);
}

// ── PLANT ──
function openPlant(si,side){ plantTarget={si,side}; document.getElementById('flower-msg').value=''; document.getElementById('plant-modal').classList.add('visible'); }
function closePlantModal()  { document.getElementById('plant-modal').classList.remove('visible'); plantTarget=null; }
function setWho(w) {
  selWho=w;
  document.getElementById('who-him').className='who-btn'+(w==='him'?' active':'');
  document.getElementById('who-her').className='who-btn'+(w==='her'?' active':'');
}
function confirmPlant() {
  if(!plantTarget)return;
  const fl={id:Date.now(),si:plantTarget.si,side:plantTarget.side,fid:selF,who:selWho,
    msg:document.getElementById('flower-msg').value.trim(),
    date:new Date().toLocaleDateString('en-GB')};
  myF.push(fl); save(); closePlantModal();
  renderBed(fl.si,fl.si,null); // refresh
  renderBed(fl.si,fl.side,null);
  document.getElementById('hud-f').textContent=`🌸 ${myF.length}`;
  // bloom last
  const fc=document.getElementById(`fc-${fl.si}-${fl.side}`);
  if(fc&&fc.lastElementChild){const sv=fc.lastElementChild.querySelector('svg');if(sv)sv.classList.add('bloom');}
  toast(`${fdef(selF).name} planted by ${fl.who==='him'?'Talha':'Aysha'}! 🌱`);
}

// ── INFO ──
function openInfo(data){
  document.getElementById('info-flower').innerHTML=flowerSVG(data.fid,60,130);
  document.getElementById('info-who').textContent=`Planted by ${data.who==='him'?'Talha 💙':'Aysha 💗'}`;
  document.getElementById('info-date').textContent=data.date;
  document.getElementById('info-msg').textContent=data.msg||'(no message)';
  document.getElementById('info-modal').classList.add('visible');
}
function closeInfoModal(){ document.getElementById('info-modal').classList.remove('visible'); }

let toastT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2500);}

document.addEventListener('keydown',e=>{if(e.key==='ArrowUp')moveUp();if(e.key==='ArrowDown')moveDown();});

buildWorld();
document.getElementById('hud-f').textContent=`🌸 ${myF.length}`;
// show first label
setTimeout(()=>{const el=document.getElementById('section-label');el.textContent=SECTIONS[0].name;el.style.opacity='1';el._t=setTimeout(()=>el.style.opacity='0',2200);},300);

}

// Ensure first screen is always the choice screen.
showScreen('welcome-screen');
</script>
</body>
</html>
